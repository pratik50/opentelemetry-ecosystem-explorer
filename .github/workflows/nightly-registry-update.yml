name: Nightly Registry Update

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Watcher 1: Collector
  run-collector-watcher:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache repository clones
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: tmp_repos
          key: tmp-repos-collector
          restore-keys: |
            tmp-repos-

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

      - name: Install dependencies
        run: uv sync

      - name: Run collector-watcher
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run collector-watcher

      - name: Upload registry changes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-registry
          path: ecosystem-registry/
          if-no-files-found: ignore

  # Watcher 2: Java
  run-java-watcher:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.run.outcome }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

      - name: Install dependencies
        run: uv sync

      - name: Run java-instrumentation-watcher
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run java-instrumentation-watcher

      - name: Upload registry changes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-registry
          path: ecosystem-registry/
          if-no-files-found: ignore

  # Merge changes + Create PR
  create-pr:
    runs-on: ubuntu-latest
    needs: [run-collector-watcher, run-java-watcher]
    # Run as long as at least one watcher succeeded
    if: |
      always() &&
      (needs.run-collector-watcher.result == 'success' ||
       needs.run-java-watcher.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect repository type (if on a fork we use different git config)
        id: repo_check
        run: |
          if [ "${{ github.repository }}" == "open-telemetry/opentelemetry-ecosystem-explorer" ]; then
            echo "is_primary=true" >> $GITHUB_OUTPUT
          else
            echo "is_primary=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git (primary repository)
        if: steps.repo_check.outputs.is_primary == 'true'
        run: |
          .github/scripts/use-cla-approved-bot.sh

      - uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        if: steps.repo_check.outputs.is_primary == 'true'
        id: otelbot-token
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Configure git (fork)
        if: steps.repo_check.outputs.is_primary == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Download artifacts from whichever watchers succeeded
      - name: Download collector registry changes
        if: needs.run-collector-watcher.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: collector-registry
          path: ecosystem-registry/

      - name: Download java registry changes
        if: needs.run-java-watcher.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: java-registry
          path: ecosystem-registry/

      - name: Check for inventory changes
        id: check_changes
        run: |
          git add -N ecosystem-registry/ 2>/dev/null || true
          if git diff --quiet ecosystem-registry/ && [ -z "$(git ls-files --others --exclude-standard ecosystem-registry/)" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.repo_check.outputs.is_primary == 'true' && steps.otelbot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="otelbot/automated-inventory-update"

          git add ecosystem-registry/

          git commit -m "Update registry inventory"

          git push -f origin HEAD:${BRANCH}

          PR_TITLE="[automated] Update registry inventory"
          PR_BODY="$(cat <<'EOF'
          Automated nightly scan detected changes in registry data.
          ---

          _This PR is automatically generated by the Nightly Registry Update workflow._
          EOF
          )"

          # Check if an open PR exists for this branch
          if gh pr list --head ${BRANCH} --state open --json number --jq '.[0].number' | grep -q .; then
            echo "Open PR already exists, updating..."
            gh pr edit ${BRANCH} --title "${PR_TITLE}" --body "${PR_BODY}"
          else
            echo "Creating new PR..."
            gh pr create --title "${PR_TITLE}" --body "${PR_BODY}" --base main --head ${BRANCH}
          fi

  # Notifications
  notify-collector:
    permissions:
      contents: read
      issues: write
    needs: [run-collector-watcher]
    if: always()
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.run-collector-watcher.result == 'success' }}
      watcher-name: "collector-watcher"

  notify-java:
    permissions:
      contents: read
      issues: write
    needs: [run-java-watcher]
    if: always()
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.run-java-watcher.result == 'success' }}
      watcher-name: "java-instrumentation-watcher"