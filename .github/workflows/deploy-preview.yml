name: Deploy Preview

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.label.name == 'deploy-preview'
    runs-on: ubuntu-latest

    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check changed files
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            explorer:
              - 'ecosystem-explorer/**'

      - name: Setup Node
        if: steps.changes.outputs.explorer == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: ecosystem-explorer/.nvmrc
          cache: npm
          cache-dependency-path: ecosystem-explorer/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.explorer == 'true'
        working-directory: ecosystem-explorer
        run: npm ci

      - name: Build preview
        if: steps.changes.outputs.explorer == 'true'
        working-directory: ecosystem-explorer
        run: npm run netlify-build:preview

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        id: deploy
        run: |
          DEPLOY_URL=$(netlify deploy \
            --dir=ecosystem-explorer/dist \
            --alias=pr-${{ github.event.pull_request.number }} \
            --site=$NETLIFY_SITE_ID \
            --auth=$NETLIFY_AUTH_TOKEN \
            --json | jq -r '.deploy_url')
          echo "NETLIFY_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.NETLIFY_URL }}"
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚀 Deploy preview ready!\n\n 🔗 ${url}`
            })